name: Python Tests

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r remediation_agent/requirements.txt
          python -m pip install -r incident_api/requirements.txt
          python -m pip install pytest httpx

      - name: Run unit tests
        run: python -m pytest -v